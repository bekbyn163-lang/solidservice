<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Kunder – Solidservice</title>
<style>
  *{box-sizing:border-box;margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
  body{background:#eef2f5;color:#0f172a;padding-bottom:40px}
  .top{background:linear-gradient(120deg,#0b5a6e,#0891b2);color:#fff;padding:18px 18px 22px}
  .top h1{font-size:20px;font-weight:700}
  .top p{font-size:13px;opacity:.9;margin-top:3px}
  .wrap{max-width:760px;margin:0 auto;padding:0 14px}
  .bar{display:flex;gap:10px;align-items:center;margin:16px 0 6px}
  .bar h2{font-size:16px;flex:1}
  button{cursor:pointer;border:0;border-radius:10px;font-size:14px;font-weight:600}
  .refresh{background:#0891b2;color:#fff;padding:8px 14px}
  .stat{background:#fff;border-radius:14px;padding:14px 16px;margin-top:14px;display:flex;
        gap:18px;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .stat b{display:block;font-size:22px;color:#0b5a6e}
  .stat span{font-size:12px;color:#64748b}
  .card{background:#fff;border-radius:14px;padding:16px;margin-top:12px;
        box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:4px solid #0891b2}
  .meta{font-size:12px;color:#64748b;margin-bottom:6px}
  .title{font-size:15px;font-weight:600;line-height:1.35;margin-bottom:12px}
  .msg{background:#f1f5f9;border-radius:10px;padding:12px;font-size:14px;line-height:1.5;
       white-space:pre-wrap;color:#1e293b}
  .actions{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}
  .open{background:#0b5a6e;color:#fff;padding:10px 16px;text-decoration:none;border-radius:10px;
        font-size:14px;font-weight:600}
  .copy{background:#10b981;color:#fff;padding:10px 16px}
  .copy.done{background:#059669}
  .empty{background:#fff;border-radius:14px;padding:24px;margin-top:12px;text-align:center;
         color:#475569;font-size:14px;line-height:1.6;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .empty a{color:#0891b2}
  .foot{text-align:center;color:#94a3b8;font-size:12px;margin-top:22px}
</style>
</head>
<body>
  <div class="top">
    <h1>🧽 Solidservice – Kunder</h1>
    <p>Privatpersoner som söker städ. Öppna inlägget, kopiera svaret, klistra in. Klart.</p>
  </div>

  <div class="wrap">
    <div class="stat" id="stat"></div>

    <div class="bar">
      <h2>🟢 Möjliga kunder</h2>
      <button class="refresh" onclick="load()">↻ Uppdatera</button>
    </div>
    <div id="leads"></div>

    <div class="foot">
      Robotarna jobbar dygnet runt i bakgrunden. Fler privatkunder = sätt upp Google Alerts
      (se <b>ORGANIC-GUIDE.md</b>). Företag mejlas automatiskt av mejlroboten.
    </div>
  </div>

<script>
function esc(s){return (s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

function copyMsg(btn, text){
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent="✓ Kopierat!"; btn.classList.add("done");
    setTimeout(()=>{btn.textContent="📋 Kopiera svar"; btn.classList.remove("done");},1800);
  });
}

async function load(){
  // B2B-räknare
  try{
    const p = await (await fetch('prospects.json?'+Date.now())).json();
    const ko = p.filter(x=>x.email && x.status==='Att kontakta').length;
    const sent = p.filter(x=>x.status==='Kontaktad').length;
    document.getElementById('stat').innerHTML =
      `<div><b>${ko}</b><span>företag i kö att mejlas</span></div>`+
      `<div><b>${sent}</b><span>företag redan mejlade</span></div>`+
      `<div><b>${p.length}</b><span>företag totalt i listan</span></div>`;
  }catch(e){ document.getElementById('stat').style.display='none'; }

  // Organiska privatkund-leads
  let leads=[];
  try{ leads = await (await fetch('organic_leads.json?'+Date.now())).json(); }catch(e){}
  const box = document.getElementById('leads');
  if(!leads.length){
    box.innerHTML = `<div class="empty">Inga nya privatkunder just nu. 🔍<br>
      Roboten kollar var 3:e timme. För fler träffar: skapa gratis <b>Google Alerts</b>
      enligt <b>ORGANIC-GUIDE.md</b> – då fångar den folk som frågar efter städ i forum,
      bloggar och grupper.</div>`;
    return;
  }
  box.innerHTML = leads.map(l=>`
    <div class="card">
      <div class="meta">${esc(l.source)} · ${esc(l.date||'')}</div>
      <div class="title">${esc(l.title)}</div>
      <div class="msg" id="m_${esc(l.id)}">${esc(l.message)}</div>
      <div class="actions">
        <a class="open" href="${encodeURI(l.link)}" target="_blank" rel="noopener">↗ Öppna inlägget</a>
        <button class="copy" onclick='copyMsg(this, document.getElementById("m_${esc(l.id)}").innerText)'>📋 Kopiera svar</button>
      </div>
    </div>`).join('');
}
load();
setInterval(load, 90000);
</script>
</body>
</html>
