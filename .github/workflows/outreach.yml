name: B2B-utskick (kontorsstadning)

# Kor automatiskt vardagar 08:00 UTC (~09-10 svensk tid) + en manuell "Run"-knapp.
on:
  # PAUSAD 2026-06-27: automatiska utskick AVSTÄNGDA (på användarens begäran).
  # Avkommentera raderna nedan för att återuppta schemalagt utskick.
  # schedule:
  #   - cron: "0 8 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write   # for att committa tillbaka prospects.json (vem som kontaktats)

concurrency:
  group: outreach
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installera beroenden
        run: pip install -r requirements.txt

      - name: Skicka utskick
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: send.one.com
          OUTREACH_PER_RUN: "8"
          SITE_URL: "https://solidservicestad.onrender.com/"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python cloud_outreach.py

      - name: Spara vilka som kontaktats
        run: |
          git config user.name "solidservice-bot"
          git config user.email "bot@users.noreply.github.com"
          git add prospects.json || true
          git commit -m "Auto: uppdatera kontaktade prospekt [skip ci]" || echo "inget att committa"
          git push || echo "inget att pusha"
